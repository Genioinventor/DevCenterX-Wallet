<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevCenterX Crypto - Monero Wallet & Monitor</title>

    <!-- Detección de billetera: redirige al setup si no hay cuenta guardada -->
    <script>
        (function() {
            try {
                var saved = localStorage.getItem('dcc_accounts');
                if (!saved) { window.location.replace('new/index.html'); return; }
                var arr = JSON.parse(saved);
                if (!Array.isArray(arr) || arr.length === 0) { window.location.replace('new/index.html'); }
            } catch(e) { window.location.replace('new/index.html'); }
        })();
    </script>

    <!-- Tipografía Inter Premium y JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
          --bg: #0d1222;
          --bg-2: #070a14;
          --card-red-1: #e01c1c; /* Cherry red matching image_4d66e2.jpg */
          --card-red-2: #7a0000; /* Dark crimson deep cherry */
          --blue-circle: #131b31;
          --blue-circle-border: #222d4a;
          --text-main: #f3f5f9;
          --text-dim: #94a3b8;
          --text-faint: rgba(148, 163, 184, 0.2);
          --accent: #ff8c1a;
          --accent-grad: linear-gradient(135deg, #ff8c1a, #e65c00);
          --success: #10b981;
          --error: #ef4444;
          --sidebar-width: 280px;
          --spring-transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
          --smooth-transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
          box-sizing: border-box;
          -webkit-tap-highlight-color: transparent;
          font-family: 'Inter', sans-serif;
        }

        html, body {
          width: 100vw;
          height: 100vh;
          margin: 0;
          padding: 0;
          overflow: hidden;
          position: fixed;
          -webkit-text-size-adjust: 100%;
        }

        body {
          background-color: var(--bg-2);
          color: var(--text-main);
          touch-action: pan-y;
        }

        @keyframes pulse-radar {
          0% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 0 0 rgba(0, 209, 255, 0.4); }
          70% { transform: scale(1.1); opacity: 0; box-shadow: 0 0 0 30px rgba(0, 209, 255, 0); }
          100% { transform: scale(1); opacity: 0; }
        }

        @keyframes pulse-orange-glow {
          0%, 100% { box-shadow: 0 0 20px rgba(255, 140, 26, 0.4); transform: scale(1); }
          50% { box-shadow: 0 0 45px rgba(255, 140, 26, 0.8); transform: scale(1.03); }
        }

        @keyframes float-gentle {
          0%, 100% { transform: translateY(0px); }
          50% { transform: translateY(-8px); }
        }

        .radar-active::after {
          content: '';
          position: absolute;
          inset: -5px;
          border-radius: 50%;
          border: 4px solid #00D1FF;
          animation: pulse-radar 2s infinite;
          z-index: 1;
        }

        .app-container {
          display: flex;
          flex-direction: column;
          height: 100%;
          width: 100%;
          background: radial-gradient(circle at top right, #111827 0%, #030712 100%);
        }

        .main-content {
          flex: 1;
          padding: 24px 20px 100px 20px;
          width: 100%;
          max-width: 100%;
          margin: 0 !important;
          overflow-y: auto;
          -webkit-overflow-scrolling: touch;
        }

        .mobile-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 12px 20px;
          background-color: rgba(7, 10, 20, 0.95);
          backdrop-filter: blur(15px);
          -webkit-backdrop-filter: blur(15px);
          border-bottom: 1px solid var(--blue-circle-border);
          position: sticky;
          top: 0;
          z-index: 90;
        }

        .header-brand-container {
          display: flex;
          flex-direction: column;
          gap: 2px;
        }

        .header-title-text {
          font-size: 14px;
          font-weight: 800;
          background: linear-gradient(135deg, #ffffff, #94a3b8);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          letter-spacing: -0.2px;
        }

        .account-switcher-badge {
          display: flex;
          align-items: center;
          gap: 6px;
          background: rgba(255, 255, 255, 0.05);
          border: 1px solid rgba(255, 255, 255, 0.1);
          padding: 4px 10px;
          border-radius: 20px;
          cursor: pointer;
          font-size: 11px;
          font-weight: 600;
          color: var(--accent);
          width: fit-content;
          transition: var(--smooth-transition);
        }

        .account-switcher-badge:active {
          background: rgba(255, 255, 255, 0.15);
          transform: scale(0.95);
        }

        .global-stats {
          display: none;
          gap: 12px;
          background: rgba(255,255,255,0.05);
          padding: 6px 12px;
          border-radius: 30px;
          border: 1px solid var(--blue-circle-border);
        }

        .stat-item {
          font-family: 'JetBrains Mono', monospace;
          font-size: 10px;
          font-weight: 700;
          display: flex;
          align-items: center;
          gap: 4px;
        }

        #webTerminal {
          background: #000;
          border: 1px solid var(--blue-circle-border);
          border-radius: 16px;
          padding: 15px;
          height: 180px;
          overflow-y: auto;
          font-family: 'JetBrains Mono', monospace;
          font-size: 9px;
          line-height: 1.4;
          color: #00ff41;
          display: none;
          box-shadow: inset 0 0 20px rgba(0,255,65,0.05);
        }

        #webTerminal div { margin-bottom: 2px; }
        #webTerminal .info { color: #fff; }
        #webTerminal .success { color: #00D1FF; }
        #webTerminal .error { color: #ff5e3a; }

        /* Immersive Page Transitions */
        .screen {
          display: none;
          animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .screen.active {
          display: block;
        }

        @keyframes fadeInUp {
          from { opacity: 0; transform: translateY(16px); }
          to { opacity: 1; transform: translateY(0); }
        }

        .dashboard-grid {
          display: grid;
          grid-template-columns: 1fr;
          gap: 32px;
        }

        .gear-btn {
          width: 44px;
          height: 44px;
          border-radius: 50%;
          background: var(--blue-circle);
          border: 1px solid var(--blue-circle-border);
          color: #94a3b8;
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          transition: var(--smooth-transition);
        }
        .gear-btn:active {
          background: var(--blue-circle-border);
          color: #fff;
          transform: scale(0.9);
        }

        .username { font-size: 30px; font-weight: 800; letter-spacing: -1px; }
        .subtitle-header { font-size: 13px; color: var(--text-dim); }

        .balance-card {
          position: relative;
          padding: 30px 28px;
          border-radius: 28px;
          overflow: hidden;
          background: linear-gradient(145deg, var(--card-red-1) 0%, var(--card-red-2) 100%);
          box-shadow: 0 15px 35px rgba(180, 20, 20, 0.45);
          border: 1px solid rgba(255, 255, 255, 0.2);
          transition: var(--spring-transition);
        }

        .balance-card:active {
          transform: scale(0.98);
        }

        /* Glossy reflection exact match */
        .balance-card::before {
          content: '';
          position: absolute;
          top: 35%;
          left: -25%;
          width: 150%;
          height: 100%;
          background: linear-gradient(to bottom, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0) 100%);
          transform: rotate(-14deg);
          pointer-events: none;
        }

        .card-label {
          font-size: 15px;
          font-weight: 500;
          color: rgba(255, 255, 255, 0.9);
          margin-bottom: 8px;
          letter-spacing: -0.1px;
        }

        .card-amount {
          margin-top: 4px;
          line-height: 1.1;
        }

        .card-amount #xmrBalance {
          font-size: 46px;
          font-weight: 700;
          color: #ffffff;
          letter-spacing: -1px;
        }

        .card-amount .xmr-suffix {
          font-size: 34px;
          font-weight: 400;
          color: rgba(255, 255, 255, 0.7);
          margin-left: 8px;
        }

        .card-fiat {
          margin-top: 20px;
          display: flex;
          flex-direction: column;
          gap: 3px;
        }

        .fiat-row {
          font-size: 18px;
          font-weight: 500;
          color: rgba(255, 255, 255, 0.95);
          letter-spacing: -0.2px;
        }

        /* Custom pill-style dark translucent calculator button */
        .btn-calcular {
          display: inline-flex;
          align-items: center;
          background: rgba(0, 0, 0, 0.4);
          backdrop-filter: blur(8px);
          color: #ffffff;
          font-size: 14px;
          font-weight: 600;
          padding: 10px 24px;
          border-radius: 25px;
          border: 1px solid rgba(255, 255, 255, 0.1);
          cursor: pointer;
          margin-top: 24px;
          transition: var(--smooth-transition);
          z-index: 10;
          position: relative;
        }

        .btn-calcular:active {
          background: rgba(0, 0, 0, 0.6);
          transform: scale(0.95);
        }

        .btn-calcular span {
          margin-right: 6px;
        }

        .pill-btn {
          flex: 1;
          border-radius: 20px;
          padding: 16px;
          cursor: pointer;
          border: 1px solid var(--blue-circle-border);
          background: var(--blue-circle);
          transition: var(--smooth-transition);
        }
        .pill-btn:active {
          transform: scale(0.95);
          background: var(--blue-circle-border);
        }

        .dashboard-panel {
          background: var(--blue-circle);
          border: 1px solid var(--blue-circle-border);
          border-radius: 24px;
          padding: 24px;
          box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
        }

        .bottom-nav {
          position: fixed;
          bottom: 20px;
          left: 50%;
          transform: translateX(-50%);
          width: calc(100% - 32px);
          max-width: 520px;
          background: rgba(13, 18, 34, 0.95);
          backdrop-filter: blur(20px);
          -webkit-backdrop-filter: blur(20px);
          border: 1px solid var(--blue-circle-border);
          border-radius: 24px;
          display: flex;
          padding: 6px;
          z-index: 100;
          box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .nav-btn {
          flex: 1;
          background: none;
          border: none;
          color: var(--text-dim);
          padding: 12px 6px;
          border-radius: 18px;
          font-weight: 700;
          cursor: pointer;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 4px;
          transition: var(--smooth-transition);
        }
        .nav-btn.active {
          background: rgba(255, 140, 26, 0.12);
          color: var(--accent);
        }
        .nav-btn span {
          font-size: 10px;
        }

        .address-input {
          width: 100%;
          background: var(--blue-circle);
          border: 1.5px solid var(--blue-circle-border);
          border-radius: 18px;
          padding: 18px;
          color: #fff;
          outline: none;
          font-family: 'JetBrains Mono', monospace;
        }
        .continue-btn {
          background: var(--accent-grad);
          color: #fff;
          border: none;
          border-radius: 20px;
          padding: 18px;
          font-weight: 800;
          width: 100%;
          cursor: pointer;
          margin-top: 20px;
          transition: var(--spring-transition);
          box-shadow: 0 8px 20px rgba(255, 140, 26, 0.3);
        }
        .continue-btn:active {
          transform: scale(0.96);
        }

        .modal-overlay {
          position: fixed;
          inset: 0;
          background: rgba(0,0,0,0.85);
          display: none;
          align-items: flex-end;
          justify-content: center;
          z-index: 200;
          backdrop-filter: blur(8px);
        }
        .modal-overlay.open { display: flex; }

        .settings-sheet {
          width: 100%;
          background: #0d1425;
          border-radius: 32px 32px 0 0;
          padding: 20px 0 40px;
          max-height: 92vh;
          overflow-y: auto;
          animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideUp {
          from { transform: translateY(100%); }
          to { transform: translateY(0); }
        }

        /* Immersive full-screen overlay */
        .full-screen-panel {
          position: fixed;
          inset: 0;
          background: #070a14;
          z-index: 400;
          display: none;
          flex-direction: column;
          overflow-y: auto;
          -webkit-overflow-scrolling: touch;
          animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .full-screen-panel.open {
          display: flex;
        }

        @keyframes slideInRight {
          from { transform: translate3d(100%, 0, 0); }
          to { transform: translate3d(0, 0, 0); }
        }

        .panel-header {
          display: flex;
          align-items: center;
          padding: 18px 20px;
          background-color: #0d1425;
          border-bottom: 1px solid var(--blue-circle-border);
          position: sticky;
          top: 0;
          z-index: 10;
        }

        .panel-content {
          flex: 1;
          padding: 24px 20px 40px;
          display: flex;
          flex-direction: column;
          gap: 20px;
        }

        .settings-header {
          display: flex;
          align-items: center;
          padding: 0 24px 20px;
        }

        .settings-header h2 { flex: 1; text-align: center; margin: 0; font-size: 18px; font-weight: 700; color: #fff; }

        .close-circle {
          width: 36px;
          height: 36px;
          border-radius: 50%;
          background: rgba(255,255,255,0.05);
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
        }

        .settings-section-title {
          font-size: 14px;
          font-weight: 600;
          color: #94a3b8;
          padding: 12px 24px 12px;
          display: flex;
          align-items: center;
          gap: 10px;
        }

        .settings-group {
          background: #161f32;
          border-radius: 20px;
          margin: 0 16px 20px;
          overflow: hidden;
          border: 1px solid rgba(255,255,255,0.03);
        }

        .settings-row {
          display: flex;
          align-items: center;
          gap: 16px;
          padding: 16px 20px;
          border-bottom: 1px solid rgba(255,255,255,0.05);
          cursor: pointer;
          transition: var(--smooth-transition);
        }

        .settings-row:last-child { border-bottom: none; }
        .settings-row:active { background: rgba(255,255,255,0.05); }

        .row-icon {
          width: 36px;
          height: 36px;
          border-radius: 10px;
          display: flex;
          align-items: center;
          justify-content: center;
          color: #fff;
        }

        .row-label { flex: 1; font-size: 15px; font-weight: 500; color: #f3f5f9; }
        .row-chevron { color: #475569; }

        .temp-slider-box {
            padding: 0 20px 16px;
            background: #161f32;
        }
        .slider-header { display: flex; justify-content: space-between; font-size: 12px; color: var(--accent); font-weight: 800; margin-bottom: 10px; }
        .custom-slider {
            width: 100%;
            height: 6px;
            background: #0d1425;
            border-radius: 5px;
            outline: none;
            -webkit-appearance: none;
        }
        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: var(--accent);
            border: 4px solid #161f32;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255,140,26,0.3);
        }

        .sync-toast { position: fixed; top: 24px; left: 50%; transform: translate3d(-50%, -20px, 0); background: #131b31; color: #fff; padding: 12px 24px; border-radius: 30px; opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .sync-toast.show { opacity: 1; transform: translate3d(-50%, 0, 0); }

        .calculator-input-group {
          display: flex;
          flex-direction: column;
          gap: 6px;
          margin-bottom: 16px;
        }
        .calculator-input-group label {
          font-size: 12px;
          color: var(--text-dim);
          font-weight: 600;
        }
        .calculator-field-wrapper {
          position: relative;
          display: flex;
          align-items: center;
        }
        .calculator-field-wrapper span {
          position: absolute;
          right: 16px;
          font-weight: 700;
          color: var(--accent);
          font-size: 14px;
        }
        .calculator-input {
          width: 100%;
          background: #161f32;
          border: 1.5px solid var(--blue-circle-border);
          border-radius: 14px;
          padding: 14px 50px 14px 16px;
          color: #fff;
          font-family: 'JetBrains Mono', monospace;
          outline: none;
          font-size: 16px;
        }
        .calculator-input:focus {
          border-color: var(--accent);
        }

        .detail-card-metric {
          background: rgba(255, 255, 255, 0.03);
          border: 1px solid rgba(255, 255, 255, 0.05);
          border-radius: 16px;
          padding: 14px 16px;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
        }

        .detail-tab {
          flex: 1;
          padding: 12px;
          border-radius: 30px;
          font-size: 11px;
          font-weight: 700;
          cursor: pointer;
          border: 1px solid transparent;
          color: var(--text-dim);
          background: rgba(255, 255, 255, 0.02);
          text-align: center;
          transition: var(--smooth-transition);
        }
        .detail-tab.active {
          background: rgba(255, 140, 26, 0.15);
          color: var(--accent);
          border-color: rgba(255, 140, 26, 0.3);
        }

        .onboarding-description {
          font-size: 14px;
          font-weight: 400;
          color: var(--text-dim);
          line-height: 1.6;
          max-width: 280px;
          margin-top: 20px;
        }

        .setup-screen-unused {
          display: none;
        }

        .setup-header {
          display: flex;
          align-items: center;
          margin-bottom: 24px;
        }

        .setup-title {
          font-size: 24px;
          font-weight: 800;
          letter-spacing: -0.5px;
          color: #fff;
        }

        /* Step System Wizard Animation */
        .wizard-step-container {
          flex: 1;
          display: flex;
          width: 300%; /* Three steps wide */
          transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .wizard-step {
          width: 33.333%;
          padding: 4px;
          display: flex;
          flex-direction: column;
          justify-content: space-between;
          height: 100%;
        }

        .setup-field {
          display: flex;
          flex-direction: column;
          gap: 12px;
          margin-bottom: 24px;
        }

        .setup-field label {
          font-size: 11px;
          font-weight: 700;
          color: var(--accent);
          letter-spacing: 1px;
        }

        .setup-input {
          background: #111827;
          border: 1.5px solid var(--blue-circle-border);
          border-radius: 16px;
          padding: 18px;
          color: #fff;
          font-size: 15px;
          outline: none;
          transition: var(--smooth-transition);
        }

        .setup-input:focus {
          border-color: var(--accent);
          box-shadow: 0 0 10px rgba(255, 140, 26, 0.2);
        }

        .pin-pad {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 12px;
          margin-top: 15px;
          max-width: 280px;
          align-self: center;
          width: 100%;
        }

        .pin-btn {
          aspect-ratio: 1;
          border-radius: 50%;
          background: rgba(255,255,255,0.04);
          border: 1px solid rgba(255,255,255,0.05);
          color: #fff;
          font-size: 20px;
          font-weight: 700;
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          transition: var(--smooth-transition);
        }

        .pin-btn:active {
          background: var(--accent-grad);
          transform: scale(0.9);
        }

        .pin-dots {
          display: flex;
          justify-content: center;
          gap: 12px;
          margin: 15px 0;
        }

        .pin-dot {
          width: 14px;
          height: 14px;
          border-radius: 50%;
          border: 1.5px solid var(--blue-circle-border);
          background: transparent;
          transition: var(--smooth-transition);
        }

        .pin-dot.filled {
          background: var(--accent);
          border-color: var(--accent);
          transform: scale(1.2);
        }

        /* Quick Account Switcher Dropdown */
        .quick-switch-dropdown {
          position: absolute;
          top: 65px;
          left: 20px;
          background: #111827;
          border: 1px solid var(--blue-circle-border);
          border-radius: 20px;
          padding: 12px;
          z-index: 210;
          display: none;
          flex-direction: column;
          gap: 8px;
          box-shadow: 0 15px 35px rgba(0,0,0,0.6);
          width: 240px;
          animation: fadeInUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .quick-switch-dropdown.open {
          display: flex;
        }

        .dropdown-account-item {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 10px 14px;
          border-radius: 12px;
          cursor: pointer;
          background: rgba(255,255,255,0.02);
          border: 1px solid transparent;
          transition: var(--smooth-transition);
        }

        .dropdown-account-item:active {
          background: rgba(255,255,255,0.08);
          transform: scale(0.97);
        }

        .dropdown-account-item.active {
          border-color: var(--accent);
          background: rgba(255, 140, 26, 0.08);
        }

        .dropdown-account-name {
          font-size: 13px;
          font-weight: 700;
          color: #fff;
        }

        .dropdown-account-sub {
          font-size: 10px;
          color: var(--text-dim);
        }

        /* Cryptographic Loader overlay styling */
        .crypto-loader-overlay {
          position: fixed;
          inset: 0;
          background: #04060b;
          z-index: 600;
          display: none;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          padding: 30px;
        }

        /* ===== TOOLX SECTION STYLES ===== */
        .toolx-featured-card {
          position: relative;
          background: rgba(255,140,26,0.06);
          border: 2px solid rgba(255,140,26,0.55);
          border-radius: 20px;
          padding: 20px 20px 18px;
          margin-bottom: 16px;
          cursor: pointer;
          overflow: hidden;
          transition: transform 0.15s ease, background 0.2s ease;
        }
        .toolx-featured-card:active { transform: scale(0.98); }
        .toolx-nuevo-badge {
          position: absolute;
          top: 0; right: 0;
          background: #FF8C1A;
          color: #fff;
          font-size: 10px;
          font-weight: 900;
          letter-spacing: 1px;
          padding: 6px 14px 5px 18px;
          border-radius: 0 18px 0 20px;
          clip-path: polygon(18% 0%, 100% 0%, 100% 100%, 0% 100%);
        }
        .toolx-featured-icon {
          width: 52px; height: 52px;
          border-radius: 16px;
          background: rgba(255,140,26,0.12);
          display: flex; align-items: center; justify-content: center;
        }
        .toolx-grid {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 12px;
          margin-bottom: 16px;
        }
        .toolx-card {
          background: #111827;
          border: 1.5px solid rgba(255,255,255,0.06);
          border-radius: 18px;
          padding: 18px 14px 16px;
          cursor: pointer;
          transition: transform 0.15s ease, background 0.2s ease;
        }
        .toolx-card:active { transform: scale(0.97); background: #1a2235; }
        .toolx-card-icon {
          width: 42px; height: 42px;
          border-radius: 12px;
          display: flex; align-items: center; justify-content: center;
          margin-bottom: 12px;
        }
        .toolx-card-title {
          font-size: 15px;
          font-weight: 700;
          color: #f1f5f9;
          margin-bottom: 4px;
        }
        .toolx-card-sub {
          font-size: 11px;
          color: #64748b;
          font-weight: 500;
        }
        .toolx-settings-row {
          display: flex;
          align-items: center;
          gap: 14px;
          background: #111827;
          border: 1.5px solid rgba(255,255,255,0.06);
          border-radius: 18px;
          padding: 16px 18px;
          cursor: pointer;
          transition: background 0.2s ease;
          margin-bottom: 20px;
        }
        .toolx-settings-row:active { background: #1a2235; }
        .toolx-settings-icon {
          width: 40px; height: 40px;
          border-radius: 12px;
          background: rgba(148,163,184,0.1);
          display: flex; align-items: center; justify-content: center;
          flex-shrink: 0;
        }
        /* ===== END TOOLX ===== */

        .key-display-item {
          background: #111827;
          border: 1.5px solid var(--blue-circle-border);
          padding: 16px;
          border-radius: 16px;
          font-family: 'JetBrains Mono', monospace;
          font-size: 11px;
          color: #fff;
          overflow-wrap: break-word;
          word-break: break-all;
          position: relative;
        }

        .key-display-title {
          font-size: 11px;
          font-weight: 800;
          color: var(--accent);
          margin-bottom: 6px;
          text-transform: uppercase;
          letter-spacing: 0.5px;
        }

        .mask-overlay {
          position: absolute;
          inset: 0;
          background: rgba(17, 24, 39, 0.94);
          backdrop-filter: blur(4px);
          border-radius: 14px;
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          font-size: 11px;
          font-weight: 700;
          color: var(--text-dim);
          transition: var(--smooth-transition);
        }
        .mask-overlay:hover {
          color: var(--accent);
        }

        .copy-btn-inline {
          position: absolute;
          right: 12px;
          bottom: 12px;
          background: rgba(255, 255, 255, 0.05);
          border: 1px solid rgba(255, 255, 255, 0.1);
          padding: 6px 10px;
          border-radius: 8px;
          color: #94a3b8;
          cursor: pointer;
          font-size: 10px;
          font-weight: 600;
          transition: var(--smooth-transition);
        }
        .copy-btn-inline:active {
          background: rgba(255, 140, 26, 0.15);
          color: var(--accent);
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sync-toast" id="infoToast">Sincronizado</div>

    <header class="mobile-header">
        <div class="header-brand-container">
            <!-- Exact Header requested brand title "DevCenterX Crypto" -->
            <span class="header-title-text" style="font-size: 16px;">DevCenterX Crypto</span>
            <!-- Acceso rápido a Cartera -->
            <div class="account-switcher-badge" id="accountSwitcherBadge" onclick="window.location.href='cartera/index.html'">
                <span id="activeAccountName">Cargando Cartera...</span>
                <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="3">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </div>
        </div>

        <div class="global-stats">
            <div class="stat-item" style="color: var(--accent);">
                <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v20M2 12h20"/></svg>
                <span id="globalTemp">--°C</span>
            </div>
            <div class="stat-item" style="color: #00D1FF;">
                <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="2" width="20" height="20" rx="2" ry="2"/></svg>
                <span id="globalRam">--%</span>
            </div>
        </div>
    </header>

    <main class="main-content">

        <!-- PANTALLA: MINAR -->
        <section class="screen active" id="screen-mining">
            <div class="user-row" style="text-align: center; align-items: center; margin-bottom: 40px;">
                <span class="username" id="displayActiveWalletName">Mi Cartera</span>
                <span class="subtitle-header">Minería Nativa de Monero</span>
            </div>

            <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 40vh; margin-top: 20px;">
                <div id="btnContainerLarge" style="position: relative; width: 180px; height: 180px; display: flex; align-items: center; justify-content: center;">
                    <button id="miningBtnLarge" style="width: 140px; height: 140px; border-radius: 50%; border: none; background: #333; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; z-index: 2; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); transition: var(--spring-transition);">
                        <svg viewBox="0 0 24 24" width="50" height="50" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                        <span id="miningBtnTextLarge" style="font-weight: 800; font-size: 12px; margin-top: 8px;">INICIAR</span>
                    </button>
                </div>

                <button id="goToTerminalBtn" style="display: none; margin-top: 30px; background: rgba(0, 163, 255, 0.15); border: 1.5px solid #00D1FF; color: #00D1FF; padding: 12px 24px; border-radius: 14px; font-weight: 800; font-size: 13px; cursor: pointer; transition: var(--smooth-transition);">
                    ABRIR TERMINAL DE EVENTOS
                </button>

                <div class="dashboard-grid" style="grid-template-columns: 1fr 1fr; width: 100%; margin-top: 30px; gap: 12px;">
                    <div class="dashboard-panel" style="padding: 12px; text-align: center;">
                        <div style="font-size: 9px; color: var(--text-dim); font-weight: 700;">TEMPERATURA</div>
                        <div id="tempDisplayLarge" style="font-size: 16px; font-weight: 800; color: #fff; margin-top: 2px;">--°C</div>
                    </div>
                    <div class="dashboard-panel" style="padding: 12px; text-align: center;">
                        <div style="font-size: 9px; color: var(--text-dim); font-weight: 700;">USO RAM</div>
                        <div id="ramDisplayLarge" style="font-size: 16px; font-weight: 800; color: #fff; margin-top: 2px;">--%</div>
                    </div>
                    <div class="dashboard-panel" style="padding: 12px; text-align: center;">
                        <div style="font-size: 9px; color: var(--text-dim); font-weight: 700;">HASHRATE</div>
                        <div id="hashrateDisplay" style="font-size: 16px; font-weight: 800; color: #00D1FF; margin-top: 2px;">0.00 H/s</div>
                    </div>
                    <div class="dashboard-panel" style="padding: 12px; text-align: center;">
                        <div style="font-size: 9px; color: var(--text-dim); font-weight: 700;">SHARES (A/R)</div>
                        <div id="sharesDisplay" style="font-size: 16px; font-weight: 800; color: var(--success); margin-top: 2px;">0 / 0</div>
                    </div>
                </div>

                <div id="webTerminal" style="width: 100%; margin-top: 20px;"></div>
            </div>
        </section>

        <!-- PANTALLA: DISPOSITIVOS -->

    </main>

    <nav class="bottom-nav">
        <button class="nav-btn active" data-tab="mining">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
            <span>Minar</span>
        </button>
        <button class="nav-btn" onclick="window.location.href='cartera/index.html'">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Cartera</span>
        </button>
        <button class="nav-btn" onclick="window.location.href='devices/index.html'">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
                <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
                <line x1="6" y1="6" x2="6.01" y2="6"/>
                <line x1="6" y1="18" x2="6.01" y2="18"/>
            </svg>
            <span>Dispositivos</span>
        </button>
        <button class="nav-btn" onclick="window.location.href='toolx/index.html'">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
            <span>ToolX</span>
        </button>
    </nav>
</div>

<script>
    // ============================================================
    // MINAR - DevCenterX Crypto (raíz)
    // Solo lógica de minería + lectura de la cuenta activa.
    // La gestión de cuentas/cartera vive en /cartera/
    // ============================================================

    let accounts = [];
    let activeAccountIndex = 0;
    const DEFAULT_WALLET = '49gtMxxALvzRRnEW8wsW7iS6EWGhmk9jrcZ3DJFRhG3e6dhkYGAaFaAbh1H3t8qkyX1YRosWF2gpN18bod4c7hGcMSZg4j3';
    let isMiningLocal = false;

    const elements = {
        activeAccountName: document.getElementById('activeAccountName'),
        displayActiveWalletName: document.getElementById('displayActiveWalletName'),
        tempDisplay: document.getElementById('tempDisplayLarge'),
        ramDisplay: document.getElementById('ramDisplayLarge'),
        miningBtn: document.getElementById('miningBtnLarge'),
        miningBtnText: document.getElementById('miningBtnTextLarge'),
        btnContainer: document.getElementById('btnContainerLarge'),
        goToTerminalBtn: document.getElementById('goToTerminalBtn'),
        webTerminal: document.getElementById('webTerminal'),
        globalTemp: document.getElementById('globalTemp'),
        globalRam: document.getElementById('globalRam')
    };

    function appendWebLog(line) {
        if (!elements.webTerminal) return;
        const div = document.createElement('div');
        div.textContent = `> ${line}`;

        if (line.includes('accepted')) div.className = 'success';
        else if (line.includes('rejected') || line.includes('error')) div.className = 'error';
        else if (line.includes('speed') || line.includes('hashrate')) div.className = 'info';

        elements.webTerminal.appendChild(div);
        if (elements.webTerminal.childNodes.length > 50) elements.webTerminal.removeChild(elements.webTerminal.firstChild);
        elements.webTerminal.scrollTop = elements.webTerminal.scrollHeight;
    }

    // ── Cuentas: solo lectura (la gestión completa vive en /cartera/) ──
    function loadAccountsFromStorage() {
        const saved = localStorage.getItem('dcc_accounts');
        if (saved) {
            accounts = JSON.parse(saved);
            activeAccountIndex = parseInt(localStorage.getItem('dcc_active_idx')) || 0;
            return true;
        }
        return false;
    }

    function loadActiveAccount() {
        const acct = accounts[activeAccountIndex] || {
            name: "Default Wallet",
            address: DEFAULT_WALLET
        };
        if (elements.activeAccountName) elements.activeAccountName.textContent = acct.name;
        if (elements.displayActiveWalletName) elements.displayActiveWalletName.textContent = acct.name;
    }

    function updateMiningUI(mining) {
        isMiningLocal = mining;
        const blueGrad = 'linear-gradient(135deg, #00D1FF, #0077FF)';
        const darkGrad = '#333';

        if (isMiningLocal) {
            elements.miningBtn.style.background = blueGrad;
            elements.miningBtn.style.boxShadow = '0 0 30px rgba(0, 209, 255, 0.6)';
            elements.miningBtn.style.borderRadius = '32px';
            elements.miningBtnText.textContent = 'DETENER';
            elements.goToTerminalBtn.style.display = 'block';
            elements.btnContainer.classList.add('radar-active');
            elements.webTerminal.style.display = 'block';

            if (typeof AndroidMiner !== 'undefined' && AndroidMiner.getRecentLogs) {
                const logs = JSON.parse(AndroidMiner.getRecentLogs());
                elements.webTerminal.innerHTML = '';
                logs.forEach(line => appendWebLog(line));
            }
        } else {
            elements.miningBtn.style.background = darkGrad;
            elements.miningBtn.style.boxShadow = '0 10px 30px rgba(0, 0, 0, 0.5)';
            elements.miningBtn.style.borderRadius = '50%';
            elements.miningBtnText.textContent = 'INICIAR';
            elements.goToTerminalBtn.style.display = 'none';
            elements.btnContainer.classList.remove('radar-active');
            elements.webTerminal.style.display = 'none';
            elements.webTerminal.innerHTML = '';
        }
    }

    // Puente con la app nativa de minería
    window.updateFromAndroid = function(data) {
        if (data.isMining !== undefined) updateMiningUI(data.isMining);

        if (data.deviceTemp) {
            elements.tempDisplay.textContent = data.deviceTemp;
            elements.globalTemp.textContent = data.deviceTemp;
        }

        if (data.ramUsage) {
            elements.ramDisplay.textContent = data.ramUsage;
            elements.globalRam.textContent = data.ramUsage;
        }

        if (data.hashrate) {
            document.getElementById('hashrateDisplay').textContent = data.hashrate;
        }

        if (data.acceptedShares !== undefined) {
            document.getElementById('sharesDisplay').textContent = `${data.acceptedShares} / ${data.rejectedShares || 0}`;
        }

        if (data.logLine) {
            appendWebLog(data.logLine);
        }
    };

    window.setInitialConfig = function() {
        // La configuración de dirección/temperatura se administra en /cartera/
    };

    function init() {
        loadAccountsFromStorage();
        loadActiveAccount();

        // Tap Navigation Configuration (solo botones con pantalla propia, p.ej. Minar)
        document.querySelectorAll('.nav-btn[data-tab]').forEach(btn => {
            btn.onclick = () => {
                const tab = btn.dataset.tab;
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('screen-' + tab).classList.add('active');
                btn.classList.add('active');

                document.querySelector('.global-stats').style.display = (tab === 'mining') ? 'flex' : 'none';
            };
        });

        elements.miningBtn.onclick = () => {
            if (typeof AndroidMiner !== 'undefined') {
                if (isMiningLocal) AndroidMiner.stopMining();
                else AndroidMiner.startMining();
            } else {
                updateMiningUI(!isMiningLocal);
            }
        };

        elements.goToTerminalBtn.onclick = () => {
            if (typeof AndroidMiner !== 'undefined') AndroidMiner.showTerminal();
        };

        const activeTab = document.querySelector('.nav-btn.active').dataset.tab;
        document.querySelector('.global-stats').style.display = (activeTab === 'mining') ? 'flex' : 'none';
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
